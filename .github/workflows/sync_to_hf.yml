name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "b23cs137@kitsw.ac.in"
          git config --global user.name "SSP999"
          git remote add hf https://SSP999:${HF_TOKEN}@huggingface.co/spaces/SSP999/my-openenv || true
          git push hf main --force
